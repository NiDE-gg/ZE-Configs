; Disable bhop
modify:
{
	match:
	{
		"classname" "logic_auto"
		"origin" "-6656 -10112 32"
	}
	insert:
	{
		"OnMapSpawn" "servercommand,Command,sv_enablebunnyhopping 0,0,-1"
	}
}

; Increase stage 1 boss health
modify:
{
	match:
	{
		"classname" "trigger_multiple"
		"targetname" "level_1_boss_trigger_multiple"
	}
	delete:
	{
		"OnStartTouch" "level_1_boss_hp_add,Add,45,0,-1"
	}
	insert:
	{
		"OnStartTouch" "level_1_boss_hp_add,Add,135,0,-1"
	}
}
modify:
{
	match:
	{
		"classname" "math_counter"
		"targetname" "level_1_boss_hp_add"
	}
	replace:
	{
		"max" "5500"
	}
}

