; Delete junk message
modify:
{
	match:
	{
		"classname" "weapon_knife"
		"targetname" "zombie_speed_weapon"
	}
	delete:
	{
		"OnPlayerPickup" "servercommand,Command,say <<< Walk backwards and press e to use,80,0"
