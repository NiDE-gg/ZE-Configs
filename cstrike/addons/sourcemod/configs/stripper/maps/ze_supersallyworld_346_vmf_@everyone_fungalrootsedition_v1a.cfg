; sally stripper 1
; edited on 2026-06-15
; please place strippered .nut files in /scripts/vscripts/eltrasnag/nide26_edit

; replace tee blaster script with fixed stripper one
modify:
{
	match:
	{
		"vscripts" "eltrasnag/nide26/item/item_tee.nut"
	}
	replace:
	{
		"vscripts" "eltrasnag/nide26_edit/item_tee.nut"
	}
}

; replace mapsys with strippered version
modify:
{
	match:
	{
		"vscripts" "eltrasnag/nide26/mapsys.nut"
	}
	replace:
	{
		"vscripts" "eltrasnag/nide26_edit/mapsys.nut"
	}
}

; ////////// fix missing music info text on certain ambient generics ///////////
; funkytown
modify:
{
	match:
	{
		"classname" "ambient_generic"
		"message" "#music/eltra/funkytown.mp3"
	}
	insert:
	{
		"vscripts" "eltrasnag/modules/musinfo.nut"
	}
}

; funnysong
modify:
{
	match:
	{
		"classname" "ambient_generic"
		"message" "#music/eltra/funnysong.mp3"
	}
	insert:
	{
		"vscripts" "eltrasnag/modules/musinfo.nut"
	}
}

; /////// fix stage 1 night music not getting played ///////
; Add output on the trigger once after fruits
modify: {
	match: {
		"origin" "-7552 12416 -13440"
	}

	insert: {
		"OnTrigger" "mus_rockinback,PlaySound,0,-1"
	}
}