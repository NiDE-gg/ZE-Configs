; "ze_gladiator_v1" stripper config made by "Berke" "STEAM_0:0:95142811", version 1.

; Fix spawning with glocks.
filter:
{
	"classname" "game_player_equip"
	"origin" "152 8 8"
}

modify:
{
	match:
	{
		"classname" "filter_activator_team"
		"targetname" "spawn1filter1"
	}
	insert:
	{
		"OnFail" "weapon_glock,Kill,,,1"
	}
}

; Fix "Arena" mode.
modify:
{
	match:
	{
		"classname" "filter_activator_team"
		"targetname" "spawn1filter1"
	}
	delete:
	{
		"OnUser2" "!self,AddOutput,OnPass spectator1case1:PickRandom:::-1,0.01,1"
		"OnUser2" "arena1relay1,Kill,,0.01,1"
	}
	insert:
	{
		"OnUser2" "arena1relay1,Kill,,.02,1"
		"OnUser2" "!self,AddOutput,OnPass spectator1case1:PickRandom:::-1,.02,1"
	}
}