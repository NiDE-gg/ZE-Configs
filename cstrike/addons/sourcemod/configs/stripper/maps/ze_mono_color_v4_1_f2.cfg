;------------------------------------------
; General map changes / Fixes
;------------------------------------------
; Adds filter + decreases speed to a push
modify:
{
	match:
	{
		"targetname" "s3_push1"
		"classname" "trigger_push"
	}
	replace:
	{
		"speed" "500"
	}
	insert:
	{
		"filtername" "Human"
	}
}

