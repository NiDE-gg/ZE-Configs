;------------------------------------------
; Logic_auto updates
;------------------------------------------
; Makes sure the server stays up to date with the newest stripper + adds the other logic_autos outputs
modify:
{
	match:
	{
		"origin" "136 -11576 -247"
		"classname" "logic_auto"
	}
	delete:
	{
		"OnMapSpawn" "commandsCommandmp_roundtime 200-1"
	}
	insert:
	{
		"OnMapSpawn" "commandsCommandmp_roundtime 300-1"
		"OnMapSpawn" "commandsCommandsay <> Stripper loaded <>3-1"
		"OnMapSpawn" "commandsCommandsay Map by Hazer0.5-1"
		"OnMapSpawn" "equipfixtriggerDisable21"
		"OnMapSpawn" "playerFireUser111"
	}
}

; Removes other logic_autos so only 1 exist
filter:
{
	"origin" "2864 -7336 448"
	"classname" "logic_auto"
}
filter:
{
	"origin" "-13162 -12222 -4016"
	"classname" "logic_auto"
}

;------------------------------------------
; Boss changes
;------------------------------------------
; Increases the boss_hp_add more hp per player
modify:
{
	match:
	{
		"targetname" "boss_hp_add"
		"origin" "3456 -9280 6240"
		"classname" "trigger_once"
	}
	delete:
	{
		"OnStartTouch" "boss_hpAdd8000-1"
	}
	insert:
	{
		"OnStartTouch" "boss_hpAdd32000-1"
	}
}

; When players dies it subtracts X hp from the boss itself
modify:
{
	match:
	{
		"targetname" "s2_boss_pit"
		"origin" "4224 -9276 6000"
		"classname" "trigger_hurt"
	}
	replace:
	{
		; Was 0
		"StartDisabled" "1"
	}
	insert:
	{
		"OnHurtPlayer" "boss_hpSubtract16000-1"
	}
}
modify:
{
	match:
	{
		"origin" "3712 -9280 6272"
		"classname" "trigger_once"
	}
	insert:
	{
		"OnStartTouch" "s2_boss_pitEnable10.51"
	}
}

