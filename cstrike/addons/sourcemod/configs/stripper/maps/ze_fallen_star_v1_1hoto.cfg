; Tweaks minigame, fixes item and final elevator on ze_fallen_star_v1_1hoto ;
;------------------------

;Tweaks FSB Minigame
;-------------------
modify:
{
	match:
	{
		"classname" "logic_relay"
		"targetname" "FSB_ENDING_MINIGAME"
	}
	delete:
	{
		"OnTrigger" "FSB_CHECKEREnable242-1"
		"OnTrigger" "FSB_HUMAN_NUKEEnable244-1"
		"OnTrigger" "cmdCommandzr_respawn_delay 3216-1"
		"OnTrigger" "ZombieComing_casePickRandom220.50-1"
	}
}

;Elevator Stuck Fix
;-------------------
filter:
{
	"targetname" "FSB_LIFT_3"
	"origin" "-8967.78 -1840 1784.02"
	"classname" "func_movelinear"
}
add:
{
	"model" "*113"
	"hammerid" "68559"
	"classname" "func_door"
	"disablereceiveshadows" "1"
	"disableshadows" "1"
	"dmg" "10000"
	"forceclosed" "1"
	"health" "0"
	"ignoredebris" "0"
	"lip" "-1232"
	"locked_sentence" "0"
	"loopmovesound" "0"
	"movedir" "-90 0 0"
	"origin" "-8967.78 -1840 1784.02"
	"renderamt" "255"
	"rendercolor" "255 255 255"
	"renderfx" "0"
	"rendermode" "0"
	"spawnflags" "4096"
	"spawnpos" "0"
	"speed" "58"
	"targetname" "FSB_LIFT_3"
	"unlocked_sentence" "0"
	"wait" "-1"
}

;Item Fix
;-------------------
modify:
{
	match:
	{
		"classname" "trigger_once"
		"targetname" "FSI_WATER_TRIGGER"
	}
	replace:
	{
		"classname" "trigger_multiple"
	}
}