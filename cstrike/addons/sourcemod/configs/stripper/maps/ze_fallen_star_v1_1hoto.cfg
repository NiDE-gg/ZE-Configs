; disables human nuke + removes the weapons uppon dropping on ze_fallen_star_v1_1hoto ;
;------------------------

modify:
{
    match:
    {
        "classname" "logic_relay"
        "targetname" "FSB_ENDING_MINIGAME"
    }
    delete:
    {
	"OnTrigger" "FSB_CHECKEREnable242-1"
	"OnTrigger" "FSB_HUMAN_NUKEEnable244-1"
