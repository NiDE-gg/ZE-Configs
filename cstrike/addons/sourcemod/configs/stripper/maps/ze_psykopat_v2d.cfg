; stripper for ze_psykopat_v2d ;
;------------------------
; Adjust lasers, reduce zombie knockback by 30%, increase screamer timer bound, fixes stage 2
;------------------------


;-- Knockback reduce

modify:
{
	match:
	{
		"classname" "logic_auto"
		"origin" "6317 129 887"
	}
	insert:
	{
		"OnNewGame" "cmd,command,zr_class_modify zombies knockback 0.7 1,0,-1"
	}
}

;-- Lasers adjustment

modify:
{
	match:
	{
		"classname" "logic_relay"
		"targetname" "laser_minigame"
	}
	delete:
	{
		"OnTrigger" "lasertim,RefireTime,0.25,45,-1"
		"OnTrigger" "lasertim2,RefireTime,0.28,45,-1"
	}
	insert:
	{
		"OnTrigger" "lasertim,RefireTime,0.33,45,-1"
		"OnTrigger" "lasertim2,RefireTime,0.38,45,-1"
	}
}

;-- Increase lower and upper random bound timer by 17 seconds

modify:
{
	match:
	{
		"classname" "logic_timer"
		"targetname" "screamer_timer"
	}
	replace:
	{
		"LowerRandomBound" "105"
		"UpperRandomBound" "137"
	}
}

;-- RTV 1 FIX

modify:
{
	match:
	{
		"classname" "trigger_teleport"
		"targetname" "zm_tp_rtv1"
	}
	replace:
	{
		"target" "afk_rd_3"
	}
}

modify:
{
	match:
	{
		"classname" "trigger_teleport"
		"targetname" "afk_tp_4"
	}
	replace:
	{
		"target" "afk_rd_4"
	}
}
