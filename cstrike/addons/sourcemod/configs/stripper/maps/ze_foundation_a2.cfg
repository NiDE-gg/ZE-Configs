; ze_foundation
; last updated - 06/26/26

; ----- vscript changes! make sure to include the respective files below -----

; add 1.1x zm speed
modify:
{
	match:
	{
		"classname" "trigger_teleport"
		"targetname" "Spawn_Teleport"
	}
	replace:
	{
		"vscripts" "ze_foundation/spawn.nut"
	}
}

; nerf advent ultimate dmg from 600 -> 350
modify:
{
	match:
	{
		"classname" "prop_dynamic"
		"targetname" "Cutscene_Advent"
	}
	replace:
	{
		"vscripts" "ze_foundation/advent.nut"
	}
}

; ----------

modify:
{
	match:
	{
		"classname" "logic_auto"
	}
	insert:
	{
		"OnMapSpawn" "Server_CMDCommandsv_enablebunnyhopping 101"
		"OnMapSpawn" "Server_CMDCommandsay - Map fixed | 06/26/26 -11"
	}
}

; stage 1

; add level relay
add:
{
	"classname" "logic_relay"
	"targetname" "Stage1_LevelRelay"
	"origin" "0 0 0"
	"StartDisabled" "0"
	"spawnflags" "0"
	"OnSpawn" "!selfKill01"
	"OnSpawn" "Server_CMDCommandsv_enablebunnyhopping 051"
}

; fix music not stopping
modify:
{
	match:
	{
		"classname" "trigger_once"
		"targetname" "Stage1_Defend3_Trigger"
	}
	insert:
	{
		"OnStartTouch" "Stage1_Music1RunScriptCodefadeout();251"
	}
}

; enable bhop
modify:
{
	match:
	{
		"classname" "logic_relay"
		"targetname" "Stage1_Bridge_Relay"
	}
	insert:
	{
		"OnTrigger" "Server_CMDCommandsv_enablebunnyhopping 15-1"
	}
}

; stage 2

; disable grinnaux counter until boss is active
modify:
{
	match:
	{
		"classname" "math_counter"
		"targetname" "Grinnaux_Health"
	}
	replace:
	{
		"StartDisabled" "1"
	}
}
modify:
{
	match:
	{
		"classname" "logic_relay"
		"targetname" "Knights_Relay"
	}
	insert:
	{
		"OnUser2" "Grinnaux_HealthEnable1.98-1"
	}
}

; stage 3

; add level relay
add:
{
	"classname" "logic_relay"
	"targetname" "Stage3_LevelRelay"
	"origin" "0 0 0"
	"StartDisabled" "0"
	"spawnflags" "0"

	"OnSpawn" "!selfKill01"
	"OnSpawn" "Stage3_TeleportCallScriptFunctionUpdateTarget15.021"
}

; update teleport
modify:
{
	match:
	{
		"classname" "trigger_once"
		"targetname" "Stage3_Defend3"
	}
	insert:
	{
		"OnStartTouch" "Stage3_TeleportCallScriptFunctionUpdateTarget20.021"
	}
}

; disable thordan counter until boss is active
modify:
{
	match:
	{
		"classname" "math_counter"
		"targetname" "Thordan_Health"
	}
	replace:
	{
		"StartDisabled" "1"
	}
}
modify:
{
	match:
	{
		"classname" "trigger_once"
		"targetname" "Stage3_DefendBoss"
	}
	insert:
	{
		"OnStartTouch" "Thordan_HealthEnable35-1"
	}
}

; nerf twister
modify:
{
	match:
	{
		"classname" "trigger_multiple"
		"targetname" "Mech_Thordan_Lightning_Hurt"
	}
	delete:
	{
		"OnStartTouch" "handler_damageRunScriptCodeDealDamage_Activator(200)0-1"
	}
	insert:
	{
		"OnStartTouch" "handler_damageRunScriptCodeDealDamage_Activator(25);0-1" ;50
	}
}

; remove outer slow trigger on finale
filter:
{
	"hammerid" "1828788"
	"classname" "trigger_multiple"
}

; nerf inner slow trigger
modify:
{
	match:
	{
		"classname" "trigger_multiple"
		"targetname" "Finale_Hrae_Slow"
	}
	delete:
	{
		"OnTrigger" "!activatorRunScriptCodesetspeed(self, 0.5)0-1"
		"OnEndTouch" "!activatorRunScriptCodesetspeed(self, 1.0)0-1"
	}
	insert:
	{
		"OnTrigger" "!activatorRunScriptCodesetspeed(self, 0.75)0-1"
		"OnEndTouch" "!activatorRunScriptCodesetspeed(self, 1.1)0-1"
	}
}

; nerf hraesvelgr health
modify:
{
	match:
	{
		"classname" "logic_branch"
		"targetname" "Stage3_BranchEnd"
	}
	insert:
	{
		"OnTrue" "Finale_Hrae_HurtRunScriptCodeboss_healthscale=10;0-1"
	}
}

; nerf tower
modify:
{
	match:
	{
		"classname" "trigger_multiple"
		"targetname" "Dragonking_Tower"
	}
	delete:
	{
		"OnUser2" "!selfRunScriptCodeTower_Damage(600);0-1"
	}
	insert:
	{
		"OnUser2" "!selfRunScriptCodeTower_Damage(75);0-1" ;150
	}
}

; misc

; fix button
modify:
{
	match:
	{
		"classname" "func_button"
		"targetname" "Admin_Stage3"
	}
	replace:
	{
		"spawnflags" "1025"
	}
}