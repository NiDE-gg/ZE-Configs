;mapping contest 2026 made by Lardy
;ze_chosen_ones_b1

; Update vscript path
modify:
{
	match:
	{
		"targetname" "script_contest_map_2026_lardy"
		"classname" "logic_script"
	}
	replace:
	{
		"vscripts" "ze_chosen_ones/contest_map_2026_lardy.nut"
	}
}

; Fix boss being stuck behind the obelisks, making all the obelisks and func_movelinear not solid (the one that makes the obelisks going up)

modify:
{
	match:
	{
		"classname" "prop_dynamic"
		"targetname" "boss_obelisk"
	}
	replace:
	{
		"solid" "0"
	}
}
modify:
{
	match:
	{
		"targetname" "move_obelisk_boss"
		"classname" "func_movelinear"
	}
	replace:
	{
		"spawnflags" "8"
	}
}

