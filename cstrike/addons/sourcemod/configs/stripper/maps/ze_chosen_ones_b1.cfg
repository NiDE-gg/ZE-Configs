; Fix boss part impact on gravity attack being kill OnFullyOpen instead of OnFullyClosed

modify:
{
	match:
	{
		"targetname" "move_boss_gravity"
		"classname" "func_movelinear"
	}
	delete:
	{
		"OnFullyOpen" "boss_impact_part,Kill,,1,-1"
	}
	insert:
	{
		"OnFullyClosed" "boss_impact_part,Kill,,1,-1"
	}
}

