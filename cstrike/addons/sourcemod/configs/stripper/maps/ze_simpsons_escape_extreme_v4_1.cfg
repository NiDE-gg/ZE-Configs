;----------------------------------
; STRIPPER COUNTER extra invis fix
;----------------------------------
modify:
{
	match:
	{
		"origin" "-463.65 341.276 -4036"
        "classname" "logic_auto"
        "hammerid" "269565"
	}
	insert:
	{
		"OnMapSpawn" "console,Command,rendermode 0,0.03,-1"
		"OnMapSpawn" "console,Command,say [Stripper 1 Loaded],1,-1"
	}
}

;---------------------------------
; Give peter player knife invuln
;---------------------------------
modify:
{
	match:
	{
		"origin" "-3874.42 -581.677 -4513.37"
        "targetname" "peter_holder"
        "classname" "weapon_knife"
        "hammerid" "297454"
	}
	delete:
	{
		"OnPlayerPickup" "!activatorSetDamageFilterfilter_t_no0-1"
	}
	insert:
	{
		"OnPlayerPickup" "!activator,SetDamageFilter,filter_zm_no,0.02,-1"
	}
}

