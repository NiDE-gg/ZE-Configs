;; _

;; fix fall trigger

modify:
{
	match:
	{
		"origin" "144 648 -80"
		"classname" "trigger_hurt"
	}
	replace:
	{
		"damagetype" "0"
	}
}

;; block shortcut

add:
{
	"targetname" "clip1"
	"vrad_brush_cast_shadows" "0"
	"StartDisabled" "0"
	"spawnflags" "2"
	"Solidity" "0"
	"solidbsp" "0"
	"rendermode" "10"
	"renderfx" "0"
	"rendercolor" "255 255 255"
	"renderamt" "255"
	"origin" "-64.5 725 364"
	"invert_exclusion" "0"
	"InputFilter" "0"
	"disableshadows" "1"
	"disablereceiveshadows" "1"
	"classname" "func_brush"
	"OnUser1" "!self,AddOutput,solid 2,0,1"
	"OnUser1" "!self,AddOutput,mins -320.5 -43 -132,0.1,1"
	"OnUser1" "!self,AddOutput,maxs 320.5 43 132,0.1,1"
}
modify:
{
	match:
	{
		"classname" "logic_auto"
		"hammerid" "1608"
	}
	insert:
	{
		"OnMapSpawn" "clip1,FireUser1,,0,-1"
	}
}

