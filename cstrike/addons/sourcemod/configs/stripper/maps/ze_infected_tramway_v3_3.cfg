;-------------------
; Remove AFK Killer
;-------------------
filter:
{
    "targetname" "afk_killer"
}

filter:
{
    "targetname" "afk_relay"
}

;----------------------
; Increase nuke damage
;----------------------
modify:
{
    match:
    {
        "targetname" "final_nuke"
        "classname" "trigger_hurt"
    }
    replace:
    {
        "damage" "100000"
    }
}