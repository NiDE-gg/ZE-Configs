;---------------------------------------
; Zombie Detection system for the ending
;---------------------------------------
;move trigger outputs to a relay that can be cancelled upon zm detected
modify:
{
	match:
	{
		"targetname" "win_trigger"
		"origin" "9984 7424 256"
		"classname" "trigger_once"
		"hammerid" "697495"
	}
	delete:
	{
		"OnStartTouch" "consoleCommandsay **Thank you for playing**1-1"
		"OnStartTouch" "nukeEnable4-1"
	}
	insert:
	{
		"OnStartTouch" "relay_humanwin,Trigger,,0.02,1"
	}
}

;the relay
Add:
{
	"classname" "logic_relay"
	"targetname" "relay_humanwin"
	"origin" "9983 7423 255"
	"StartDisabled" "0"
	"spawnflags" "0"
	"OnTrigger" "console,Command,say **Thank you for playing**,2.5,-1"
	"OnTrigger" "nuke,Enable,,7,-1"
}

