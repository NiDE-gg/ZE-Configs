; Confirms that the stripper is loaded and various other logic_auto things -- also additional balance changes
modify:
{
	match:
	{
		"origin" "11264 5888 96"
		"classname" "logic_auto"
	}
	insert:
	{
		"OnMapSpawn" "console,Command,say <> Stripper 2 loaded <>,4,-1"
		"OnMapSpawn" "console,Command,zr_class_modify zombies knockback 2.5,1.5,-1"
		"OnMapSpawn" "console,Command,zr_infect_mzombie_ratio 6,1.6,-1"
		"OnMapSpawn" "zombie_speed_vscript,CallScriptFunction,StartZombieSpeedLoop,13,-1"
	}
}

