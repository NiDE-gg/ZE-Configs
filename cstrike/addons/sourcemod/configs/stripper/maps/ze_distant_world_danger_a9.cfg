; Fixes AFK teleporter placing people stuck in the roof
filter:
{
	"origin" "-2608.18 -1232.13 -3729.49"
	"targetname" "shortcut2_tpdest"
	"classname" "info_teleport_destination"
}
add:
{
	"origin" "-2608 -1232.13 -3712"
	"targetname" "new_shortcut2_tpdest"
	"angles" "0 270 0"
	"classname" "info_teleport_destination"
}
modify:
{
	match:
	{
		"targetname" "shortcut2_tp"
		"origin" "-1715.4 -1211 -3936"
		"classname" "trigger_teleport"
	}
	replace:
	{
		"target" "new_shortcut2_tpdest"
	}
}
modify:
{
	match:
	{
		"targetname" "tp_lowerfloor"
		"origin" "-1112 -928 -3864"
		"classname" "trigger_teleport"
	}
	replace:
	{
		"target" "new_shortcut2_tpdest"
	}
}

