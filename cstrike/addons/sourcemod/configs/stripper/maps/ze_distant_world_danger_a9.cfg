;------------------------------------------
; Logic_auto fixes
;------------------------------------------
; Confirms that the stripper is loaded and various other logic_auto things
modify:
{
	match:
	{
		"origin" "11264 5888 96"
		"classname" "logic_auto"
	}
	insert:
	{
		"OnMapSpawn" "consoleCommandsay <> Stripper loaded <>4-1"
	}
}

