; fix sound not terminating
modify:
{
	match:
	{
		"classname" "logic_relay"
		"targetname" "push_sound_relay"
	}
	delete:
	{
		"OnSpawn" "push_sound,StopSound,,2,-1"
	}
	insert:
	{
		"OnSpawn" "push_sound,Volume,0,2,-1"
	}
}

; nerf some TPs that might be too fast
modify:
{
	match:
	{
		"classname" "func_button"
		"origin" "-1158 104 -2576"
	}

	delete:
	{
		"OnPressed" "tp_zone6Enable3-1"
		"OnPressed" "maze_apartment_zm_trapdoorBreak48-1"
	}

	insert:
	{
		"OnPressed" "tp_zone6,Enable,,31,-1"
		"OnPressed" "maze_apartment_zm_trapdoor,Break,,52,-1"
	}
}

