; bypass invisible wall
add:
{
	"classname" "info_teleport_destination"
	"targetname" "makeup_dest"
	"origin" "8086 224 -1620"
	"angles" "0 90 0"
}
add:
{
	"classname" "trigger_teleport"
	"targetname" "makeup_tp"
	"target" "makeup_dest"
	"spawnflags" "1"
	"StartDisabled" "0"
	"origin" "8096 132 -1572"
	"OnUser1" "!self,AddOutput,solid 2,0,1"
	"OnUser1" "!self,AddOutput,mins -48 -28 -92,0.1,1"
	"OnUser1" "!self,AddOutput,maxs 48 28 92,0.1,1"
}
modify:
{
	match:
	{
		"classname" "logic_auto"
	}
	insert:
	{
		"OnMapSpawn" "makeup_tp,FireUser1,,0,-1"
		"OnMapSpawn" "makeup_jump1,FireUser1,,0,-1"
		"OnMapSpawn" "makeup_jump1_push,FireUser1,,0,-1"
		"OnMapSpawn" "makeup_jump2,FireUser1,,0,-1"
		"OnMapSpawn" "makeup_jump2_push,FireUser1,,0,-1"
		"OnMapSpawn" "makeup_jump3,FireUser1,,0,-1"
		"OnMapSpawn" "makeup_jump3_push,FireUser1,,0,-1"
		"OnMapSpawn" "makeup_jump4,FireUser1,,0,-1"
		"OnMapSpawn" "makeup_jump4_push,FireUser1,,0,-1"
		"OnMapSpawn" "console,Command,mp_roundtime 40,0,-1"
	}
}

; break parent relationship for a prop dynamic which is required for map structure
modify:
{
	match:
	{
		"classname" "prop_dynamic"
		"origin" "3000 -2032 -2400"
	}
	replace:
	{
		"parentname" ""
	}
}

