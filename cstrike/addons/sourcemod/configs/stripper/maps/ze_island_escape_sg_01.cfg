;; increase nuke damage

modify:
{
	match:
	{
		"targetname" "global_hurt"
		"classname" "trigger_hurt"
	}
	replace:
	{
		"damage" "20000"
	}
}

;; trigger nuke only by boat

filter:
{
	"model" "*173"
	"classname" "trigger_multiple"
}

;; keep nuke enabled

modify:
{
	match:
	{
		"targetname" "end_sequence"
		"classname" "logic_relay"
	}
	delete:
	{
		"OnTrigger" "global_hurt,Disable,,11,-1"
	}
}

;; make final water instakill (nemesis compatible)

modify:
{
	match:
	{
		"origin" "-4480 10692 -132"
		"classname" "trigger_hurt"
	}
	replace:
	{
		"damage" "100000"
	}
}
