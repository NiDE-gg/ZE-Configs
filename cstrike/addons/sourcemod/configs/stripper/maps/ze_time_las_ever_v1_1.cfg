;------------------------------------------
; Stripper changes - 6/17/2026
;------------------------------------------

;------------------------------------------
; Auto-trigger the elevator 20sec after entering the hotel
; Replace the start trigger_once with a logic relay since the trigger entity seems to be corrupted
; On test sv, if multiple players enter the trigger zone simultaneously, even when all IO-s have
; been removed from it, by killing the corresponding entities beforehand, the trigger causes
; the server to start lagging. If only few players enter the trigger, sv is fine. Also, this is
; not happening locally. As a workaround w/o recompile, remove the trigger and move all IO-s to a relay
;------------------------------------------
filter:
{
	"targetname" "hotel_start_relay"
}
add:
{
	"classname" "logic_relay"
	"origin" "5872 -11584 624"
	"targetname" "hotel_start_relay_fix"
	"OnTrigger" "music_three2,PlaySound,,0,1"
	"OnTrigger" "music_three1,Volume,0,0,1"
	"OnTrigger" "hotel_floor1_elevdoor,Open,,0,1"
	"OnTrigger" "console,Command,say Elevator leaving in 20 sec,0,1"
	"OnTrigger" "event_relay,Disable,,0,1"
	"OnTrigger" "countdown_timer,Enable,,10,1"
	"OnTrigger" "staircase_timer,Enable,,10,1"
	"OnTrigger" "time_las_ever_script,RunScriptCode,scaleRoomWallsHealth(),20,1"
	"OnTrigger" "hotel_floor1_elevdoor,Close,,20,1"
	"OnTrigger" "hotel_elevator,StartForward,,23,1"
}
modify:
{
	match:
	{
		"classname" "trigger_teleport"
		"targetname" "gardens_TP_toHotel_CT"
	}
	insert:
	{
		"OnStartTouch" "hotel_start_relay_fix,Trigger,,0,1"
	}
}
modify:
{
	match:
	{
		"classname" "trigger_teleport"
		"targetname" "gardens_TP_toHotel"
	}
	insert:
	{
		"OnStartTouch" "hotel_start_relay_fix,Trigger,,0,1"
	}
}

