;------------------------------------------
; Open all paths to the 2nd floor once the elevator reaches the 2nd floor
; From this point on the elevator would no longer move
;------------------------------------------
modify:
{
	match:
	{
		"classname" "path_track"
		"targetname" "hotel_elevator_p2"
	}
	insert:
	{
		"OnPass" "hotel_floor1_stairs_door,Break,,1,1"
		"OnPass" "console,Command,say Staircase to floor 2 open for zombies,1,1"
		"OnPass" "hotel_trail_hint,AddOutput,message Start from room 11 and navigate your way,1,1"
		"OnPass" "hotel_trail_hint,Display,,1.01,1"
		"OnPass" "hotel_lobby_sidewall2,Break,,5,1"
		"OnPass" "console,Command,say Elevator metal floor piece broken,5,1"
		"OnPass" "hotel_elevator_breakable,Break,,5,1"
		"OnPass" "hotel_floor1_elevdoor,Open,,5,1"
		"OnPass" "hotel_trail_hint,AddOutput,message The elevator will no longer move!,5,1"
		"OnPass" "hotel_trail_hint,Display,,5.01,1"
	}
	delete: {
		"target" "hotel_elevator_p3"
	}
}

