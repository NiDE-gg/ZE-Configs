;------------------------------------------
; Transfer the logic which handles the space platforms to vsctipt, to avoid scenarios
; where if specific platforms break the gap would become too wide for players to jump over
;------------------------------------------
modify:
{
	match:
	{
		"classname" "logic_relay"
		"targetname" "temple_space_br_enable"
	}
	insert:
	{
		"OnTrigger" "time_las_ever_script,RunScriptCode,setTSPlatformsBreakable(),0,1"
	}
	delete:
	{
		"OnTrigger" "temple_space_br_case1PickRandom01"
		"OnTrigger" "temple_space_br_case2PickRandom01"
		"OnTrigger" "temple_space_br_case3PickRandom01"
		"OnTrigger" "temple_space_br_case4PickRandom01"
	}
}

