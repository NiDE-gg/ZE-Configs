;------------------------------------------
; Auto-trigger the elevator 20sec after entering the hotel
;------------------------------------------
modify:
{
	match:
	{
		"classname" "trigger_once"
		"targetname" "hotel_start_relay"
	}
	insert:
	{
		"OnStartTouch" "hotel_floor1_elevdoor,Open,,0,1"
		"OnStartTouch" "console,Command,say Elevator leaving in 20 sec,0,1"
		"OnStartTouch" "music_three2,PlaySound,,10,1"
		"OnStartTouch" "music_three1,Volume,0,10,1"
		"OnStartTouch" "countdown_timer,Enable,,10,1"
		"OnStartTouch" "staircase_timer,Enable,,10,1"
		"OnStartTouch" "time_las_ever_script,RunScriptCode,scaleRoomWallsHealth(),20,1"
		"OnStartTouch" "hotel_floor1_elevdoor,Close,,20,1"
		"OnStartTouch" "hotel_elevator,StartForward,,23,1"
	}
	delete:
	{
		"OnStartTouch" "music_three2PlaySound01"
		"OnStartTouch" "music_three1Volume001"
		"OnStartTouch" "countdown_timerEnable01"
		"OnStartTouch" "time_las_ever_scriptRunScriptCodescaleRoomWallsHealth()01"
	}
}

