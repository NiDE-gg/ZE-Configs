;--------------------------------------------------------------------
;STRIPPER CFG BY GS_Bany (STEAM_0:0:96563815)
;--------------------------------------------------------------------
;Changing vscript path to fixed vscript
;Avoiding SCRIPT PERF WARNING by moving precache calls to be executed sequentially with a delay
;Moving ZR commands to Vscript be executed only once. Added a ZR command to prevent people from using anti-stuck teleport to Vscript
;Setting up round time based on normal/marathon mode
;--------------------------------------------------------------------
modify:
{
	match:
	{
		"origin" "-5352 376 -2936"
		"classname" "info_target"
	}
	insert:
	{
		"vscripts" "ze_source_ware/vscript_sourceware.nut"
		"OnUser1" "!selfRunScriptCodePrecacheModelsAndSounds(1)0.041"
		"OnUser1" "!selfRunScriptCodePrecacheModelsAndSounds(2)0.081"
		"OnUser1" "!selfRunScriptCodePrecacheModelsAndSounds(3)0.121"
		"OnUser1" "!selfRunScriptCodePrecacheModelsAndSounds(4)0.161"
		"OnUser1" "!selfRunScriptCodePrecacheModelsAndSounds(5)0.21"
		"OnUser1" "!selfRunScriptCodePrecacheModelsAndSounds(6)0.241"
		"OnUser2" "!selfRunScriptCodeInitZrCommands()01"
	}
}
modify:
{
	match:
	{
		"targetname" "mb_cactus_script"
		"classname" "logic_script"
	}
	insert:
	{
		"vscripts" "ze_source_ware/vscript_mbcactus.nut"
	}
}
modify:
{
	match:
	{
		"origin" "-5336 376 -2936"
		"classname" "logic_relay"
	}
	delete:
	{
		"OnSpawn" "ServerCommandzr_infect_spawntime_max 15.001"
		"OnSpawn" "ServerCommandzr_infect_spawntime_min 14.001"
		"OnSpawn" "ServerCommandmp_roundtime 2501"
	}
	insert:
	{
		"OnSpawn" "Map_ScriptFireUser101"
		"OnSpawn" "Map_ScriptFireUser201"
		"OnSpawn" "Map_ScriptRunScriptCodeSetRoundTime()0.021"
	}
}

;--------------------------------------------------------------------
;Removing game_player_die. Functionality was moved to vscript
;--------------------------------------------------------------------
filter:
{
	"classname" "trigger_brush"
	"hammerid" "2909977"
}

;--------------------------------------------------------------------
;Calling function to clear fall damage array in Vanya's room
;--------------------------------------------------------------------
modify:
{
	match:
	{
		"targetname" "vanya_init"
		"classname" "trigger_once"
	}
	insert:
	{
		"OnTrigger" "Map_ScriptRunScriptCodeVanyaClearFallDmgList()01"
	}
}

;--------------------------------------------------------------------
;Reseting player name after blocker item is killed
;--------------------------------------------------------------------
modify:
{
	match:
	{
		"targetname" "itemgsb_template"
		"classname" "point_template"
	}
	insert:
	{
		"OnEntitySpawned" "itemholdergsb_blockerAddOutputtargetname default27-1"
	}
}

;--------------------------------------------------------------------
;Delaying music stop and the killing of entities in Last Hope (boss) level
;--------------------------------------------------------------------
modify:
{
	match:
	{
		"targetname" "berke2door4"
	}
	delete:
	{
		"OnFullyOpen" "Map_ScriptRunScriptCodeStopMusic(0)01"
		"OnFullyOpen" "berke2teleport2Enable0.011"
		"OnFullyOpen" "berke2teleport2Kill0.111"
		"OnFullyOpen" "berke2stuff*Kill01"
		"OnFullyOpen" "berke2exit*Kill01"
	}
	insert:
	{
		"OnFullyOpen" "Spawn_Tele_TDisable01"
		"OnFullyOpen" "Spawn_Tele_CTDisable01"
		"OnFullyOpen" "Map_ScriptRunScriptCodeStopMusic(0)41"
		"OnFullyOpen" "berke2teleport_all_endEnable41"
		"OnFullyOpen" "berke2teleport2Enable41"
		"OnFullyOpen" "berke2exit*Kill51"
		"OnFullyOpen" "berke2stuff*Kill51"
		"OnFullyOpen" "berke2teleport2Kill51"
	}
}
modify:
{
	match:
	{
		"targetname" "berke2mapbeattrigger"
	}
