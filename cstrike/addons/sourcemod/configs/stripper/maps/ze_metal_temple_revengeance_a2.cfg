; Raise triggers by 8 units to prevent players from walking on lava
modify:
{
	match:
	{
		"classname" "trigger_push"
		"origin" "-256 9600 -72"
	}
	replace:
	{
		"origin" "-256 9600 -64"
	}
}
modify:
{
	match:
	{
		"classname" "trigger_hurt"
		"origin" "-256 9600 -72"
	}
	replace:
	{
		"origin" "-256 9600 -64"
	}
}

; Nerf Monsoons wind attack
modify:
{
	match:
	{
		"classname" "trigger_hurt"
		"targetname" "Monsoon_WOD"
	}
	replace:
	{
		"damage" "80"
	}
}

; Disable bhop and improve airacc after stage 1 elevator for surf
modify:
{
	match:
	{
		"classname" "func_movelinear"
		"targetname" "Stage1_Elevator"
	}
	insert:
	{
		"OnFullyOpen" "cmdCommandsv_airaccelerate 1000-1"
		"OnFullyOpen" "cmdCommandsv_enablebunnyhopping 00-1"
	}
}

; Reset server cvars after sundowner door
modify:
{
	match:
	{
		"classname" "func_breakable"
		"targetname" "Stage1_Door7"
	}
	insert:
	{
		"OnFullyOpen" "cmdCommandsv_airaccelerate 120-1"
		"OnFullyOpen" "cmdCommandsv_enablebunnyhopping 10-1"
	}
}

; Puff Sundowners push
modify:
{
	match:
	{
		"classname" "trigger_push"
		"targetname" "Sundowner_Push"
	}
	replace:
	{
		"speed" "666"
	}
}

; Reduce Sam's HP
modify:
{
	match:
	{
		"classname" "trigger_multiple"
		"targetname" "Sam_HpScaler"
	}
	delete:
	{
		"OnStartTouch" "SamAddHealth15000-1"
	}
	insert:
	{
		"OnStartTouch" "SamAddHealth10000-1"
	}
}

; Reduce final bridge speed to allow players time to move over
modify:
{
	match:
	{
		"classname" "func_door"
		"targetname" "Stage1_FinalBridge"
	}
	replace:
	{
		"speed" "8"
	}
}

; Fix Lightning Particle effect
modify:
{
	match:
	{
		"classname" "info_particle_system"
		"targetname" "Item_cseffect"
	}
	replace:
	{
		"effect_name" "embers_small_01"
	}
}