;-------------------------------------------------
; Change afk killer into afk teleports
;-------------------------------------------------
modify:
{
	match:
	{
		"classname" "trigger_once"
		"origin" "2752 -2272 -1092"
	}
	delete:
	{
		"OnTrigger" "afk,Toggle,,5,-1"
	}
	insert:
	{
		"OnTrigger" "afk,Enable,,5,1"
	}
}
modify:
{
	match:
	{
		"targetname" "afk"
	}
	replace:
	{
		"damage" "500"
	}
	insert:
	{
		"OnHurtPlayer" "!activator,AddOutput,origin 1536 -3736 -944,0,-1"
	}
}
