;------------------------------------------
; Logic_auto fixes
;------------------------------------------
; Confirms that the stripper is loaded + adds more roundtime...
modify:
{
	match:
	{
		"origin" "-11713 -544 912"
		"classname" "logic_auto"
	}
	delete:
	{
		"OnMapSpawn" "consoleCommandsay <> Map made by: Dex and Black Mafia <>0-1"
	}
	insert:
	{
		"OnMapSpawn" "consoleCommandmp_roundtime 200-1"
		"OnMapSpawn" "consoleCommandsay <> Stripper loaded <>6-1"
		"OnMapSpawn" "consoleCommandsay <> Map made by: Dex and ! Maffia*| Black. <>2-1"
	}
}

;------------------------------------------
; General map balances
;------------------------------------------
; A teleporter did not have client enabled
modify:
{
	match:
	{
		"targetname" "tp3"
		"origin" "-1735.43 -530 1294.06"
		"classname" "trigger_teleport"
	}
	replace:
	{
		"spawnflags" "1"
	}
}

; An AFK teleporter gets activated too fast
modify:
{
	match:
	{
		"origin" "-1747.7 -619.05 1412"
		"targetname" "castle_counter"
		"classname" "math_counter"
	}
	delete:
	{
		"OnHitMax" "tp2Enable01"
	}
	insert:
	{
		"OnHitMax" "tp2Enable101"
	}
}

; Makes a hold open a little slower
modify:
{
	match:
	{
		"origin" "1520 -608 1628"
		"classname" "trigger_once"
	}
	delete:
	{
		"OnStartTouch" "castle_doorsOpen21"
		"OnStartTouch" "castle_scOpen81"
	}
	insert:
	{
		"OnStartTouch" "consoleCommandsay <> The doors opens in 10 seconds <>01"
		"OnStartTouch" "castle_doorsOpen101"
		"OnStartTouch" "castle_scOpen21"
	}
}

