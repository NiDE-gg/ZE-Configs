;---------------------
;FIX TARGETNAME USAGE
;---------------------
modify:
{
	match:
	{
		"hammerid" "/222634|219246|219265/"
	}
	delete:
	{
		"OnPressed" "!activator,AddOutput,targetname player,1,-1"
	}
	insert:
	{
		"OnPressed" "!activator,AddOutput,targetname ,1,-1"
	}
}

;--------------
;FIX AWP SOUND
;--------------
modify:
{
	match:
	{
		"targetname" "awp_sound"
	}
	replace:
	{
		"health" "5"
		"message" "weapons\awp\awp1.wav"
	}
}

;---------------------------------------
;REWORK RED-LIGHT GREEN-LIGHT DETECTION
;---------------------------------------

;Use vscripts for detection
modify:
{
	match:
	{
		"targetname" "Game_Trigger"
	}
	replace:
	{
		"StartDisabled" "0"
	}
	insert:
	{
		"vscripts" "ze_squid_game/minigame.nut"
		"OnStartTouch" "!selfCallScriptFunctionStartTouch0-1"
		"OnEndTouch" "!selfCallScriptFunctionEndTouch0-1"
		"OnTrigger" "!selfCallScriptFunctionStartTouch0-1"
	}
}
modify:
{
	match:
	{
		"origin" "1072 -1536 64"
		"classname" "trigger_once"
		"hammerid" "64787"
	}
	delete:
	{
		"OnTrigger" "Game_Branch,FireUser2,,17.5,1"
		"OnTrigger" "squid_doll,FireUser2,,16,1"
	}
}

;Remove unused entities
filter:
{
	"targetname" "/(Temp|Maker)_Movement/"
}
filter:
{
	"targetname" "/Movement_(Look|T(arget|rigger))/"
}
filter:
{
	"targetname" "Game_Branch"
}

;------------------------
;IMPROVE MODEL ANIMATION
;------------------------
modify:
{
	match:
	{
		"hammerid" "/262936|262885/"
	}
	insert:
	{
		"targetname" "models_guard"
		"OnUser1" "!self,SetAnimation,fire,,-1"
		"OnUser1" "!self,SetAnimation,stand2,1,-1"
	}
}

;----------------
;NERF LASER SLOW
;----------------
modify:
{
	match:
	{
		"targetname" "/(l|t)_0(1|2)_hurt_zm/"
	}
	delete:
	{
		"OnHurtPlayer" "speed,Modifyspeed,1,3.5,-1"
		"OnHurtPlayer" "speed,Modifyspeed,0.9,3,-1"
		"OnHurtPlayer" "speed,Modifyspeed,0.8,2.5,-1"
		"OnHurtPlayer" "speed,Modifyspeed,0.7,2,-1"
		"OnHurtPlayer" "speed,Modifyspeed,0.6,1.5,-1"
		"OnHurtPlayer" "speed,Modifyspeed,0.5,1,-1"
		"OnHurtPlayer" "speed,Modifyspeed,0.4,0.5,-1"
		"OnHurtPlayer" "speed,Modifyspeed,0.3,0,-1"
	}
	insert:
	{
		"OnHurtPlayer" "speed,Modifyspeed,1,1.4,-1"
		"OnHurtPlayer" "speed,Modifyspeed,0.95,1.2,-1"
		"OnHurtPlayer" "speed,Modifyspeed,0.9,1,-1"
		"OnHurtPlayer" "speed,Modifyspeed,0.85,0.8,-1"
		"OnHurtPlayer" "speed,Modifyspeed,0.8,0.6,-1"
		"OnHurtPlayer" "speed,Modifyspeed,0.75,0.4,-1"
		"OnHurtPlayer" "speed,Modifyspeed,0.7,0.2,-1"
		"OnHurtPlayer" "speed,Modifyspeed,0.65,0,-1"
	}
}

;---------------------------------------------
;PREVENT PLAYERS BHOPPING ACROSS GLASS BRIDGE
;---------------------------------------------
modify:
{
	match:
	{
		"targetname" "/tr_0[1-3]/"
	}
	insert:
	{
		"OnStartTouch" "!activatorRunScriptCodelocal vVelocity = self.GetAbsVelocity(); self.SetAbsVelocity(Vector(vVelocity .x, vVelocity .y, vVelocity.z > 0 ? 0 : vVelocity.z));0-1"
	}
}