; Fixes the main_lift elevator not putting AFK dest too fast..
modify:
{
	match:
	{
		"targetname" "main_lift_move"
		"origin" "-5888 -3840 4848"
		"classname" "func_door"
	}
	delete:
	{
		"OnFullyOpen" "main_lift_teleport_protectionDisable10-1"
		"OnFullyOpen" "servercommandCommandsay < Barrier Disabled >10-1"
		"OnFullyOpen" "rooftop_break_after_elevatorBreak0-1"
		"OnFullyOpen" "zombie_catch_up_teleporterAddOutputtarget dest_10.1-1"
		"OnFullyClosed" "first_lift_barrier_humanBreak0-1"
		"OnFullyOpen" "new_zombie_catch_up_teleporterAddOutputtarget dest_10.1-1"
	}
	insert:
	{
		"OnFullyOpen" "first_lift_barrier_humanBreak0-1"
		"OnFullyOpen" "main_lift_teleport_protectionDisable5-1"
		"OnFullyOpen" "servercommandCommandsay < Barrier Disabled >5-1"
		"OnFullyOpen" "rooftop_break_after_elevatorBreak5-1"
		"OnFullyOpen" "zombie_catch_up_teleporterAddOutputtarget dest_120-1"
		"OnFullyOpen" "new_zombie_catch_up_teleporterAddOutputtarget dest_120-1"
	}
}