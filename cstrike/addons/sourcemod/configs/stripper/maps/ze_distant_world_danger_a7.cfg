	{
		"targetname" "lab2_exit_door"
		"classname" "func_movelinear"
		"hammerid" "659316"
		"origin" "-4088 -5232 -3917"
	}
	insert:
	{
		"OnFullyOpen" "script_main,RunScriptCode,GriffinChat(`Ship leaving in 20 seconds.`);,96,-1"
	}
}

