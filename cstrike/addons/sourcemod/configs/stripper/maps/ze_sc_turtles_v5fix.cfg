;; afk teleport

add:
{
	"wait" "1"
	"targetname" "afk_tele"
	"StartDisabled" "1"
	"spawnflags" "1"
	"origin" "6464 -488 1305.5"
	"classname" "trigger_multiple"
	"OnUser1" "!self,AddOutput,solid 2,0,1"
	"OnUser1" "!self,AddOutput,mins -6592 -792 -1253.5,0.1,1"
	"OnUser1" "!self,AddOutput,maxs 6592 792 1253.5,0.1,1"
	"OnStartTouch" "!activator,AddOutput,origin 12928 -475 -181,0,-1"
}
modify:
{
	match:
	{
		"classname" "logic_auto"
	}
	insert:
	{
		"OnMapSpawn" "afk_tele,FireUser1,,0.1,1"
	}
}

modify:
{
	match:
	{
		"model" "*132"
		"origin" "12928 -480 -28"
		"classname" "trigger_once"
	}
	insert:
	{
		"OnStartTouch" "Cmd,Command,say *** AFK teleport in 15 sec ***,5,1"
		"OnStartTouch" "afk_tele,Enable,,20,1"
	}
}

;; increase nuke damage

modify:
{
	match:
	{
		"targetname" "nukekill"
		"classname" "trigger_hurt"
	}
	replace:
	{
		"damage" "100000"
	}
}