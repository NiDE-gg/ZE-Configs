; Stripper for ze_boring_map_alpha4 (created by FroZRil on 19-06-2026)

; Identify for stripper to load

modify:
{
	match:
	{
		"classname" "logic_auto"
	}
	insert:
	{
		"OnMapSpawn" "console,Command,say Stripper #3 loaded,1,-1"
	}	
}

; Delete enable trigger_teleport early on first trigger_once of RGBY path
; Fix for tp stuck.

modify:
{
	match:
	{
		"classname" "trigger_once"
		"origin" "14784 -13920 -1632"
	}
	delete:
	{
		"OnTrigger" "global_tp_02_1bEnable30.01-1"
	}
}

; Decrease hold timer 20 sec to 10 sec on stage 3 Boring Tower
; stairs part (based on player feedback)

modify:
{
	match:
	{
		"classname" "trigger_multiple"
		"targetname" "tower_stair_opentrigger"
	}
	delete:
	{
		"OnTrigger" "consoleCommandsay Path will open in 20 seconds!0-1"
		"OnTrigger" "tower_stair_tpEnable20-1"
		"OnTrigger" "tower_room_casePickRandomShuffle19.9-1"
		"OnTrigger" "global_tp_03_2Enable25-1"
		"OnTrigger" "global_tp_03_1AddOutputtarget tower_floor_dest25-1"
	}
	insert:
	{
		"OnTrigger" "console,Command,say Path will open in 10 seconds!,0,-1"
		"OnTrigger" "tower_stair_tp,Enable,,10,-1"
		"OnTrigger" "tower_room_case,PickRandomShuffle,,9.9,-1"
		"OnTrigger" "global_tp_03_2,Enable,,15,-1"
		"OnTrigger" "global_tp_03_1,AddOutput,target tower_floor_dest,15,-1"
	}
}

modify:
{
	match:
	{
		"classname" "trigger_multiple"
		"targetname" "tower_stair_lasttrigger"
	}
	delete:
	{
		"OnTrigger" "consoleCommandsay Last path will open in 20 seconds!0-1"
		"OnTrigger" "tower_stair_tpEnable20-1"
		"OnTrigger" "global_tp_03_2Enable25-1"
		"OnTrigger" "global_tp_03_1AddOutputtarget tower_floor_dest25-1"
		"OnTrigger" "tower_floor_destAddOutputangles 0 90 019.9-1"
		"OnTrigger" "tower_floor_destAddOutputorigin 2496 9408 634019.9-1"
	}
	insert:
	{
		"OnTrigger" "console,Command,say Last path will open in 10 seconds!,0,-1"
		"OnTrigger" "tower_stair_tp,Enable,,10,-1"
		"OnTrigger" "global_tp_03_2,Enable,,15,-1"
		"OnTrigger" "global_tp_03_1,AddOutput,target tower_floor_dest,15,-1"
		"OnTrigger" "tower_floor_dest,AddOutput,angles 0 90 0,9.9-1"
		"OnTrigger" "tower_floor_dest,AddOutput,origin 2496 9408 6340,9.9,-1"
	}
}

