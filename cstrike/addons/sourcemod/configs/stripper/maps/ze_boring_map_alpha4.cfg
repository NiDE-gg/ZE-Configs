; add more human hp before b_01 robot bossfight (150 to 250)

modify:
{
	match:
	{
		"classname" "trigger_teleport"
		"targetname" "basement_arena_tp"
	}
	delete:
	{
		"OnEndTouch" "!activatorAddOutputhealth 1500-1"
	}
	insert:
	{
		"OnEndTouch" "!activator,AddOutput,health 250,0,-1"
	}
}

