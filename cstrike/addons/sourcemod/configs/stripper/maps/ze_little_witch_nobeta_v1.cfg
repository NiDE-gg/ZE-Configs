; -- Stripper CFG Relay --
; Change the status of the Stripper CFG relay.
; Changelog can be added with ResponseContext being modified.
modify:
{
	match:
	{
		"targetname" "_stripper_cfg_status"
	}
	delete: 
	{
		"OnSpawn" "_map_scriptRunScriptCodestripper_cfg_iteration <- -10-1"
	}
	insert:
	{
		"OnSpawn" "_map_scriptRunScriptCodestripper_cfg_iteration <- 10-1"
	}
	replace:
	{
		"ResponseContext" "- Fixed a bug where map doesn't initalize players properly.\n- Fixed a bug where the server crashes on Tania - Act 2 due to fireballs not properly despawning and is not exploding."
	}
}

; [VScript Replacement] Fix the crash of infinite loops.
modify:
{
	match:
	{
		"vscripts" "ze_nobeta/items/item.nut"
	}
	replace:
	{
		"vscripts" "ze_little_witch_nobeta/item.nut"
	}
}

; [VScript Replacement] Fix teleports not working for zombies.
modify:
{
	match:
	{
		"targetname" "_map_script"
		"classname" "logic_script"
	}
	replace:
	{
		"vscripts" "ze_little_witch_nobeta/map_script.nut"
	}
}

; [VScript Replacement] Fix the crash of Tania - Act 2, Fireball
modify:
