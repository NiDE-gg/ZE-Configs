; -- Stripper CFG Relay --
; Change the status of the Stripper CFG relay.
; Changelog can be added with ResponseContext being modified.
modify:
{
	match:
	{
		"targetname" "_stripper_cfg_status"
	}
	delete: 
	{
		"OnSpawn" "_map_scriptRunScriptCodestripper_cfg_iteration <- -10-1"
	}
	insert:
	{
		"OnSpawn" "_map_scriptRunScriptCodestripper_cfg_iteration <- 30-1"
	}
	replace:
	{
		"ResponseContext" "- Various fixes and balance changes, including Ghosts, Rage Crystal, ZM Defense, Shadow Crystal, Act 2, Nobeta Wand, and Advanced Difficulty."
	}
}

; Act 2 - Balance Last Holds
modify:
{
	match:
	{
		"targetname" "act02_boss_death_relay"
		"classname" "logic_relay"
	}
	delete:
	{
		"OnTrigger" "_map_scriptRunScriptCodeClientPrintSafe(null, `^68F9C4[Map] ^FFFFFFThe magic wall will dissipate in 25 seconds.`);5-1"
		"OnTrigger" "_map_scriptRunScriptCodeClientPrintSafe(null, `^68F9C4[Map] ^FFFFFFThe magic wall will dissipate in 10 seconds.`);20-1"
		"OnTrigger" "_map_scriptRunScriptCodeClientPrintSafe(null, `^68F9C4[Map] ^FFFFFFThe magic wall will dissipate in 5 seconds.`);25-1"
		"OnTrigger" "act02_bossclip_post_clipToggle30-1"
	}
	insert:
	{
		"OnTrigger" "_map_scriptRunScriptCodeClientPrintSafe(null, `^68F9C4[Map] ^FFFFFFThe magic wall will dissipate in 15 seconds.`);5-1"
		"OnTrigger" "_map_scriptRunScriptCodeClientPrintSafe(null, `^68F9C4[Map] ^FFFFFFThe magic wall will dissipate in 10 seconds.`);10-1"
		"OnTrigger" "_map_scriptRunScriptCodeClientPrintSafe(null, `^68F9C4[Map] ^FFFFFFThe magic wall will dissipate in 5 seconds.`);15-1"
		"OnTrigger" "act02_bossclip_post_clipToggle20-1"
	}
}

modify:
{
	match:
	{
		"targetname" "act02_end_teleport"
		"classname" "trigger_teleport"
	}
	insert:
	{
		"filtername" "filter_ct"
	}
}

