; Add message after boss death
modify:
{
	match:
	{
		"targetname" "Limur_break"
	}
	insert:
	{
		"OnBreak" "server_cmd,Command,say ** Omg Fire are sprayed... We need to comeback at initial location **,9,-1"
	}
}

