		"OnUser1" "main_viewcontrol_enable_zoneCountPlayersInZone151"
		"OnUser1" "main_viewcontrol_enable_zoneCountPlayersInZone201"
		"OnUser1" "main_viewcontrol_enable_zoneCountPlayersInZone251"
		"OnUser1" "main_viewcontrol_enable_zoneCountPlayersInZone301"
		"OnUser1" "main_viewcontrol_enable_zoneCountPlayersInZone351"
		"OnUser1" "main_viewcontrol_enable_zoneCountPlayersInZone401"
		"OnUser1" "main_viewcontrol_enable_zoneCountPlayersInZone451"
		"OnUser1" "main_viewcontrol_enable_zoneCountPlayersInZone501"
		"OnUser1" "main_viewcontrol_enable_zoneCountPlayersInZone551"
		"OnUser1" "main_viewcontrol_enable_zoneCountPlayersInZone601"
		"OnUser1" "main_viewcontrol_enable_zoneCountPlayersInZone651"
