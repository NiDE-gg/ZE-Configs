;ze_siege_of_persepolis_v1_0 -- Stripper fixes -- Last Updated June 17th, 2026.
;Thanks to NiDE for helping with testing the map before and after Stripper changes were made.
;Extra comment -- If your server has a hitmarkers plugin of sorts, please disable it as this map uses custom overlays of its own and will cause flickering.

;------------------
; General Stuff
;------------------

;Adds an extra event to the logic_listener entity to unparent the point_viewcontrol on round end just in case.

modify:
{
	match:
	{
		"targetname" "main_event_listener"
	}
	insert:
	{
		"OnEventFired" "warm_viewClearParent2.501"
	}
}

;------------------
; Warmup
;------------------

;Adds extra outputs to force late-joiners into the cutscene.

modify:
{
	match:
	{
		"targetname" "warmup_book_relay"
	}
	insert:
	{
		"OnTrigger" "main_viewcontrol_enable_zoneCountPlayersInZone51"
		"OnTrigger" "main_viewcontrol_enable_zoneCountPlayersInZone101"
		"OnTrigger" "main_viewcontrol_enable_zoneCountPlayersInZone151"
		"OnTrigger" "main_viewcontrol_enable_zoneCountPlayersInZone201"
		"OnTrigger" "main_viewcontrol_enable_zoneCountPlayersInZone251"
		"OnTrigger" "main_viewcontrol_enable_zoneCountPlayersInZone301"
		"OnTrigger" "main_viewcontrol_enable_zoneCountPlayersInZone351"
		"OnTrigger" "main_viewcontrol_enable_zoneCountPlayersInZone401"
		"OnTrigger" "main_viewcontrol_enable_zoneCountPlayersInZone451"
	}
}

;------------------
