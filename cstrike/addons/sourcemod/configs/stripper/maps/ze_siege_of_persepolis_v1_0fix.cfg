;ze_siege_of_persepolis_v1_0fix -- Stripper fixes -- Last Updated June 27th, 2026.
;Thanks to NiDE for helping with testing the map before and after Stripper changes were made.
;Extra comment -- If your server has a hitmarkers plugin of sorts, please disable it as this map uses custom overlays of its own and will cause flickering.

;------------------------------------
; 			General Stuff
;------------------------------------

;Delay zombie spawns a little bit more.

modify:
{
	match:
	{
		"targetname" "level_case"
	}
	delete:
	{
		"OnCase01" "main_console,Command,zr_infect_spawntime_max 25,0,1"
		"OnCase01" "main_console,Command,zr_infect_spawntime_min 25,0,1"
		"OnCase02" "main_console,Command,zr_infect_spawntime_min 23,0,1"
		"OnCase02" "main_console,Command,zr_infect_spawntime_max 23,0,1"
	}
	insert:
	{
		"OnCase01" "main_console,Command,zr_infect_spawntime_max 29,0,1"
		"OnCase01" "main_console,Command,zr_infect_spawntime_min 29,0,1"
		"OnCase02" "main_console,Command,zr_infect_spawntime_min 26,0,1"
		"OnCase02" "main_console,Command,zr_infect_spawntime_max 26,0,1"
	}
}

;------------------------------------
; 			Warmup Round
;------------------------------------

;Toggles the "Now Loading" overlay more often so late joiners can see it too.

modify:
{
	match:
	{
		"targetname" "warmup_relay"
	}
	insert:
	{
		"OnUser3" "warmup_overlayFireUser1121"
		"OnUser3" "warmup_overlayFireUser1241"
		"OnUser3" "warmup_overlayFireUser1361"
		"OnUser3" "warmup_overlayFireUser1481"
		"OnUser3" "warmup_overlayFireUser1601"
	}
}

;------------------------------------
; 			Episode II
;------------------------------------

;------------------
; Babylonia
;------------------

;Delay the first zombie shortcut by one extra second.

modify:
{
	match:
	{
		"targetname" "s2_babylonia_hold2_tg"
	}
	delete:
	{
		"OnStartTouch" "s2_babylonia_hold2_break,Break,,5,1"
	}
	insert:
	{
		"OnStartTouch" "s2_babylonia_hold2_break,Break,,6,1"
	}
}