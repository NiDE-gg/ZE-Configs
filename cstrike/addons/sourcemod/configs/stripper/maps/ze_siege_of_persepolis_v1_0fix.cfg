;ze_siege_of_persepolis_v1_0fix -- Stripper fixes -- Last Updated July 7th, 2026.
;Thanks to NiDE for helping with testing the map before and after Stripper changes were made.
;Extra comment -- If your server has a hitmarkers plugin of sorts, please disable it as this map uses custom overlays of its own and will cause flickering.

;------------------------------------
; 			General Stuff
;------------------------------------

;Delay zombie spawns a little bit more.

modify:
{
	match:
	{
		"targetname" "level_case"
	}
	delete:
	{
		"OnCase01" "main_consoleCommandzr_infect_spawntime_max 2501"
		"OnCase01" "main_consoleCommandzr_infect_spawntime_min 2501"
	}
	insert:
	{
		"OnCase01" "main_console,Command,zr_infect_spawntime_max 26,0,1"
		"OnCase01" "main_console,Command,zr_infect_spawntime_min 26,0,1"
	}
}

;Increases the damage of curses a bit more.

modify:
{
	match:
	{
		"targetname" "curse_aoe_hurt"
	}
	delete:
	{
		"OnStartTouch" "main_hurtAddOutputdamage 601"
	}
	insert:
	{
		"OnStartTouch" "main_hurt,AddOutput,damage 7,0,1"
	}
}

modify:
{
	match:
	{
		"targetname" "curse_crouch_hurt"
	}
	delete:
	{
		"OnStartTouch" "main_hurtAddOutputdamage 601"
	}
	insert:
	{
		"OnStartTouch" "main_hurt,AddOutput,damage 7,0,1"
	}
}

modify:
{
	match:
	{
		"targetname" "curse_jump_hurt"
	}
	delete:
	{
		"OnStartTouch" "main_hurtAddOutputdamage 601"
	}
	insert:
	{
		"OnStartTouch" "main_hurt,AddOutput,damage 7,0,1"
	}
}

;------------------------------------
; 			Warmup Round
;------------------------------------

;Toggles the "Now Loading" overlay more often so late joiners can see it too.

modify:
{
	match:
	{
		"targetname" "warmup_relay"
	}
	insert:
	{
		"OnUser3" "warmup_overlay,FireUser1,,12,1"
		"OnUser3" "warmup_overlay,FireUser1,,24,1"
		"OnUser3" "warmup_overlay,FireUser1,,36,1"
		"OnUser3" "warmup_overlay,FireUser1,,48,1"
		"OnUser3" "warmup_overlay,FireUser1,,60,1"
	}
}

;------------------------------------
; 			Episode II
;------------------------------------

;------------------
; Babylonia
;------------------

;Fixes a typo.

modify:
{
	match:
	{
		"targetname" "s2_babylonia_hold5_tg"
	}
	delete:
	{
		"OnTrigger" "main_scriptRunScriptCodechat_rd(`Oh! I'm connected to A.M.I.G.O. visual output`)61"
	}
	insert:
	{
		"OnTrigger" "main_script,RunScriptCode,chat_rd(`Oh! I'm connected to A.M.I.G.O.'s visual output`),6,1"
	}
}

;------------------
; Legion and Nuculais
;------------------

;Change the speedrate at which Perfect King Tilmun attacks.

modify:
{
	match:
	{
		"targetname" "nuculais_start_relay"
	}
	delete:
	{
		"OnTrigger" "s2_boss_atk_timerRefireTime132.051"
	}
	insert:
	{
		"OnTrigger" "s2_boss_atk_timer,RefireTime,11,2.05,1"
	}
}

;Remove PickRandomShuffle from Perfect King Tilmun's attacks.

modify:
{
	match:
	{
		"targetname" "s2_boss_branch"
	}
	delete:
	{
		"OnTrue" "nuculais_atk_casePickRandomShuffle0-1"
	}
	insert:
	{
		"OnTrue" "nuculais_atk_case,PickRandom,,0,-1"
	}
}

;------------------
; Hyposelenia
;------------------

;Changes this flippin text.

modify:
{
	match:
	{
		"targetname" "s2_hyposelenia_hold0_door"
	}
	delete:
	{
		"OnUser3" "main_scriptRunScriptCodechat_am(`Good bye -- Amigos.`)1031"
	}
	insert:
	{
		"OnUser3" "main_script,RunScriptCode,chat_am(`Adios -- Amigos.`),103,1"
	}
}

;Changelog

