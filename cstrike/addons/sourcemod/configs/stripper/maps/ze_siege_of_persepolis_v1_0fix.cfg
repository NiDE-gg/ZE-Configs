;- Increased the damage of curses from 6 to 7.
;- Delayed zombie spawn on Episode I by one second.
;- Fixed a typo in Episode II Babylonia.
;- Reduced the cooldown between attackins for Perfect King Tilmun from 13 to 11 seconds.
;- Removed PickRandomShuffle from Perfect King Tilmun's attacks.
;- Corrected a messaged at the end of Episode II.