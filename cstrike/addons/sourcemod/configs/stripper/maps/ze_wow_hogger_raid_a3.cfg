;------------------------------------------
; Logic_auto fixes
;------------------------------------------
; Confirms that the stripper is loaded
modify:
{
	match:
	{
		"origin" "-15352 15336 -11064"
		"classname" "logic_auto"
	}
	insert:
	{
		"OnMapSpawn" "server,Command,say <> Stripper loaded <>,5,-1"
		"OnMapSpawn" "server,Command,sv_enablebunnyhopping 1,1,-1"
	}
}

;------------------------------------------
; Spawn stuff fixes
;------------------------------------------
; Correctly sets the speed of zombies to be 1.1 instead of 1
modify:
{
	match:
	{
		"origin" "-14336 -4096 -2641"
		"classname" "trigger_teleport"
	}
	delete:
	{
		"OnStartTouch" "speedmod,ModifySpeed,1,0.2,-1"
		"OnStartTouch" "speedmod,ModifySpeed,1,3,-1"
	}
	insert:
	{
		"OnStartTouch" "speedmod,ModifySpeed,1.1,0.2,-1"
		"OnStartTouch" "speedmod,ModifySpeed,1.1,3,-1"
	}
}
modify:
{
	match:
	{
		"origin" "-11840 -4096 -2936"
		"classname" "trigger_multiple"
	}
	delete:
	{
		"OnTrigger" "speedmod,ModifySpeed,1,0.1,-1"
		"OnTrigger" "!activator,AddOutput,rendermode 0,0.1,-1"
		"OnTrigger" "!activator,AddOutput,renderfx 0,0.1,-1"
		"OnTrigger" "!activator,SetModelScale,1,0.1,-1"
	}
	insert:
	{
		"OnStartTouch" "speedmod,ModifySpeed,1.1,0.1,-1"
		"OnStartTouch" "!activator,AddOutput,rendermode 0,0.1,-1"
		"OnStartTouch" "!activator,AddOutput,renderfx 0,0.1,-1"
		"OnStartTouch" "!activator,SetModelScale,1,0.1,-1"
	}
}

