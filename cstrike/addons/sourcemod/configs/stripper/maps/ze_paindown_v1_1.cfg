; Increase health of zombie items
modify:
{
	match:
	{
		"classname" "weapon_knife"
		"targetname" "@zreflect_knife"
	}
	insert:
	{
		"OnPlayerPickup" "!activatorAddOutputhealth 5000001"
	}
}
modify:
{
	match:
	{
		"classname" "weapon_knife"
		"targetname" "@zrott_knife"
	}
	insert:
	{
		"OnPlayerPickup" "!activatorAddOutputhealth 5000001"
	}
}

