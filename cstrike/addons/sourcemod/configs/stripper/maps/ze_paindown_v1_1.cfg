; Shorten defenses
modify:
{
	match:
	{
		"classname" "func_button"
		"targetname" "@kaboom_button"
	}
	delete:
	{
		"OnPressed" "@cmdCommandsay **THE DOOR WILL EXPLODE IN 50 SECONDS**0-1"
		"OnPressed" "@cmdCommandsay **WATCH OUT!!!**49-1"
		"OnPressed" "@kaboom_relayTrigger50-1"
	}
	insert:
	{
		"OnPressed" "@cmdCommandsay **THE DOOR WILL EXPLODE IN 30 SECONDS**0-1"
		"OnPressed" "@cmdCommandsay **WATCH OUT!!!**29-1"
		"OnPressed" "@kaboom_relayTrigger30-1"
	}
}
modify:
{
	match:
	{
		"classname" "func_button"
		"targetname" "@under_button_event_1"
	}
	delete:
	{
		"OnPressed" "@cmdCommandsay **THE DOOR WILL OPENS IN 60 SECONDS**0-1"
		"OnPressed" "@under_event_relay_1Trigger55-1"
	}
	insert:
	{
		"OnPressed" "@cmdCommandsay **THE DOOR WILL OPENS IN 45 SECONDS**0-1"
		"OnPressed" "@under_event_relay_1Trigger40-1"
	}
}

