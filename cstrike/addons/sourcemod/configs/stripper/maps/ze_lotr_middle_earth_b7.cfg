;------------------------------------------
; Map completed relay
;------------------------------------------
; Uses a new VScript function that litterally just changes peoples skin to Gandalf as part of a intern mapping joke us mappers had.
modify:
{
	match:
	{
		"origin" "13440 12440 13640"
		"targetname" "map_complete_relay"
		"classname" "logic_relay"
	}
	delete:
	{
		"OnTrigger" "apply_mapskinCallScriptFunctionApplyHumanSkinBlackGate2-1"
		"OnTrigger" "gondor_is_fucking_under_attack_templateForceSpawn2-1"
	}
	insert:
	{
		"OnTrigger" "apply_mapskinCallScriptFunctionApplyGondorIsUnderAttack2-1"
		"OnTrigger" "consoleCommandzr_infect_spawntime_min 1400-1"
		"OnTrigger" "consoleCommandzr_infect_spawntime_max 1400-1"
		"OnTrigger" "consoleCommandsay <> We hope you enjoyed it and if you have ideas for improvements in the future let us know <>8-1"
		"OnTrigger" "consoleCommandsay <> You can also view our future ideas in the team selection menu and read about it <>10-1"
		"OnTrigger" "consoleCommandsay <> Ah yea GONDOR IS FUCKING UNDER ATTACK! <>12-1"
		"OnTrigger" "gondor_is_fucking_under_attack_templateForceSpawn12-1"
		"OnTrigger" "consoleCommandsay <> Map resets in 100 seconds <>20-1"
		"OnTrigger" "math_counter_levelSetValueNoFire2120-1"
		"OnTrigger" "consoleCommandmp_restartgame 1120-1"
		"OnTrigger" "branch_barrow_downsSetValue00-1"
		"OnTrigger" "branch_minas_morgulSetValue00-1"
		"OnTrigger" "branch_osgiliathSetValue00-1"
	}
}

