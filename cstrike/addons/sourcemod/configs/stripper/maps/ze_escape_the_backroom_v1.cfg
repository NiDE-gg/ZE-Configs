;------------------------------------------------------------
; // ze Escape The Backroom Stripper : 3 ( 16 / 6 / 2026 ) - map version : v1
;------------------------------------------------------------
modify:
{
	match:
	{
		"origin" "-10400 -48 1235.23"
		"classname" "logic_auto"
	}
	insert:
	{
		"OnMapSpawn" "sv_cmd,Command,say *** Stripper 3 loaded ***,7,-1"
	}
}

