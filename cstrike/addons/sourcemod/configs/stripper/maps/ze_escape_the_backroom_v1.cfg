;------------------------------------------------------------
; // door_entity_addhp change 400hp to 100hp
;------------------------------------------------------------
modify:
{
	match:
	{
		"classname" "trigger_multiple"
		"targetname" "lvl0_last_door_entity_addhp"
	}
	delete:
	{
		"OnStartTouch" "/.*AddHealth.*/"
	}
	insert:
	{
		"OnStartTouch" "lvl0_last_door_entity_hit_1,AddHealth,100,0,-1"
		"OnStartTouch" "lvl0_last_door_entity_hit_2,AddHealth,100,0,-1"
		"OnStartTouch" "lvl0_last_door_entity_hit_3,AddHealth,100,0,-1"
		"OnStartTouch" "lvl0_last_door_entity_hit_4,AddHealth,100,0,-1"
		"OnStartTouch" "lvl0_last_door_entity_hit_5,AddHealth,100,0,-1"
		"OnStartTouch" "lvl0_last_door_entity_hit_6,AddHealth,100,0,-1"
		"OnStartTouch" "lvl0_last_door_entity_hit_7,AddHealth,100,0,-1"
		"OnStartTouch" "lvl0_last_door_entity_hit_8,AddHealth,100,0,-1"
		"OnStartTouch" "lvl0_last_door_entity_hit_9,AddHealth,100,0,-1"
		"OnStartTouch" "lvl0_last_door_entity_hit_10,AddHealth,100,0,-1"
	}
}

;------------------------------------------------------------
; // add filter_human_team and enable trigger_afk at spawn_trigger
;------------------------------------------------------------
modify:
{
	match:
	{
		"classname" "trigger_teleport"
		"targetname" "spawn_trigger"
	}
	insert:
	{
		"filtername" "filter_human_team"
		"OnStartTouch" "sv_cmd,Command,say *** Shoot the core in front and don't touch it until it's completely destroyed. ***,4,-1"
		"OnStartTouch" "spawn_trigger_afk,Enable,,10,-1"
	}
}

