;------------------------------------------------------------
; // fast spawn
;------------------------------------------------------------
modify:
{
	match:
	{
		"origin" "-10400 -48 1235.23"
		"classname" "logic_auto"
	}
	delete:
	{
		"OnMapSpawn" "spawn_fade,Fade,,12,-1"
		"OnMapSpawn" "spawn_lvl0,Break,,15,-1"
	}
	insert:
	{
		"OnMapSpawn" "spawn_fade,Fade,,4,-1"
		"OnMapSpawn" "spawn_lvl0,Break,,8,-1"
		"OnMapSpawn" "sv_cmd,Command,zr_infect_mzombie_max 12,0,-1"
		"OnMapSpawn" "sv_cmd,Command,zr_infect_mzombie_min 12,0,-1"
	}
}

