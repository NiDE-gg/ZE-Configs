;------------------------------------------------------------
; //  change timer at math_counter for wood door 
;------------------------------------------------------------
modify:
{
	match:
	{
		"classname" "math_counter"
		"targetname" "lvl0_last_door_entity_count"
	}
	delete:
	{
		"OnHitMax" "sv_cmd,Command,say *** 45 sec ***,5,1"
        "OnHitMax" "lvl0_des4_trigger,Enable,,15,1"
		"OnHitMax" "lvl0_wood_door,Break,,50,1"
	}
	insert:
	{
		"OnHitMax" "sv_cmd,Command,say *** 40 sec ***,5,1"
        "OnHitMax" "lvl0_des4_trigger,Enable,,12,1"
		"OnHitMax" "lvl0_wood_door,Break,,45,1"
	}
}

