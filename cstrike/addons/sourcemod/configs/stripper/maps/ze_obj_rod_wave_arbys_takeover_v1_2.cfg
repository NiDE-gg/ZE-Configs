;------------------------------------------
; [edit] Added checkpoint system logic
;------------------------------------------
modify:
{
	match:
	{
		"classname" "logic_auto"
	}
	insert:
	{
		"OnMapSpawn" "console,Command,mp_roundtime 40,0,-1"
		"OnMapSpawn" "checkpoint_setup,FireUser1,,0,1"
		"OnMapSpawn" "checkpoint_cG,GetValue,,0.1,1"
	}
}

;------------------------------------------
; [new] Checkpoint system, managed through a global math counter (checkpoint_cG)
;------------------------------------------
add:
{
	"classname" "info_target"
	"origin" "1088 128 64"
	"targetname" "checkpoint_setup"
	"OnUser1" "checkpoint_c,AddOutput,classname info_target,0,1"
	"OnUser1" "checkpoint_c,AddOutput,targetname checkpoint_cG,0.02,1"
	"OnUser1" "!self,Kill,,0.04,1"
}
add:
{
	"classname" "math_counter"
	"origin" "1088 128 80"
	"max" "2"
	"startvalue" "0"
	"targetname" "checkpoint_c"
	"OnGetValue" "checkpoint_case,InValue,,0,-1"
}

;------------------------------------------
; [new] Checkpoint_cases: (math_counter max value must be large enough)
;   Case01 - start;
;   Case02 - checkpoint 1 - tp_checkpoint9 (activated upon reaching canyon_tp_checkpoint dest)
;   Case03 - checkpoint 2 - tp_checkpoint15 (activated upon reaching the top of the tower)
; When checkpoint used, also update the tp_zone1 teleport to the checkpoint dest, for AFK players
;------------------------------------------
add:
{
	"classname" "logic_case"
	"origin" "1088 128 96"
	"Case01" "0"
	"Case02" "1"
	"Case03" "2"
	"targetname" "checkpoint_case"
	"OnCase02" "arbys_TP_toCheckpoint,AddOutput,target tp_checkpoint9,0,1"
	"OnCase02" "tp_zone1,AddOutput,target tp_checkpoint9,0,1"
	"OnCase02" "checkpoint_use,Trigger,,0.1,1"
	"OnCase03" "arbys_TP_toCheckpoint,AddOutput,target tp_checkpoint15,0,1"
	"OnCase03" "tp_zone1,AddOutput,target tp_checkpoint15,0,1"
	"OnCase03" "checkpoint_use,Trigger,,0.1,1"
	"OnCase03" "tp_zone13,Enable,,0,1"
	"OnCase03" "tp_zone14,Enable,,0,1"
	"OnCase03" "tp_zone15,Enable,,0,1"
}
add:
{
	"classname" "logic_relay"
	"origin" "1088 128 112"
	"targetname" "checkpoint_use"
	"OnTrigger" "arbys_wcdoor_pushT,Enable,,0,1"
	"OnTrigger" "arbys_TP_toCheckpoint,Enable,,0,1"
	"OnTrigger" "arbys_item_spawn*,ForceSpawn,,0,1"
}

