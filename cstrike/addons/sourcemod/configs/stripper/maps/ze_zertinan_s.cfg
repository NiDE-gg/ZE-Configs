	match:
	{
		"targetname" "stage1_Boss_add_Hp"
		"classname" "trigger_multiple"
	}
	delete:
	{
		"OnStartTouch" "Adrammelech_Health,Add,50,0,-1"
		"OnStartTouch" "Adrammelech_HealthInit,Add,50,0,-1"
	}
	insert:
	{
		"OnStartTouch" "Adrammelech_Health,Add,60,0,-1"
		"OnStartTouch" "Adrammelech_HealthInit,Add,60,0,-1"
	}
}

