; Replace existing physics level system with permanent entities
add:
{
    "classname" "math_counter"
    "targetname" "stage_counter"
    "max" "4"
    "min" "1"
    "StartDisabled" "0"
    "startvalue" "1"
    "OnGetValue" "stage_case,InValue,,0,-1"
}
add:
{
    "classname" "point_template"
    "targetname" "stage_system_template"
    "Template01" "stage_counter"
    "spawnflags" "2"
}
add:
{
    "classname" "info_target"
    "targetname" "stage_counter_init"
    "spawnflags" "0"
    "OnUser1" "stage_system_template,ForceSpawn,,0,-1"
    "OnUser1" "stage_counter,AddOutput,classname info_target,0.03,-1"
    "OnUser1" "!self,Kill,,0.06,-1"
}
add:
{
    "classname" "logic_case"
    "targetname" "stage_case"
    "Case01" "1"
    "Case02" "2"
    "Case03" "3"
    "OnCase01" "lvl1,Trigger,,0.2,1"
    "OnCase02" "lvl2,Trigger,,0.2,1"
    "OnCase03" "lvl3,Trigger,,0.2,1"
}
add:
{
    "hammerid" "999901"
    "origin" "-10846.4 1711.1 -760"
    "spawnflags" "1"
    "classname" "logic_auto"
    "OnMapSpawn" "stage_counter_init,FireUser1,,0,-1"
    "OnMapSpawn" "stage_counter,GetValue,,0.03,-1"
}

; Change existing stage change triggers to the new system
modify:
{
    match:
    {
        "hammerid" "63951"
    }
    delete:
    {
        "OnStartTouch" "ml_mt,Add,1,3.1,1"
        "OnStartTouch" "ml_relay,Trigger,,3,1"
        "OnStartTouch" "th_lvl1,Enable,,3,1"
    }
    insert:
    {
        "OnStartTouch" "stage_counter,SetValue,2,0,-1"
    }
}
modify:
{
    match:
    {
        "hammerid" "64150"
    }
    delete:
    {
        "OnStartTouch" "ml_mt,Add,1,0,1"
        "OnStartTouch" "ml_relay,Trigger,,0,1"
        "OnStartTouch" "h_end_lvl2,Enable,,0,1"
    }
    insert:
    {
        "OnStartTouch" "stage_counter,SetValue,3,0,-1"
    }
}
modify:
{
    match:
    {
        "hammerid" "42668"
    }
    delete:
    {
        "OnStartTouch" "ml_mt,Add,1,0.1,1"
        "OnStartTouch" "ml_relay,Trigger,,0,1"
        "OnStartTouch" "th_lvl3,Enable,,1,1"
    }
    insert:
    {
        "OnStartTouch" "stage_counter,SetValue,1,0,-1"
    }
}

