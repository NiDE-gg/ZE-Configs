; Fix teleport on stage 2 before boss where zombies are able to reach boss platform instead of being tp on the sides
modify:
{
	match:
	{
		"targetname" "s2_tp_noboss_for_zm"
		"classname" "trigger_teleport"
	}
	replace:
	{
		"classname" "trigger_multiple"
	}
	delete:
	{
		"OnStartTouch" "s2_boss_case_dest_humansPickRandomShuffle0-1"
	}
	insert:
	{
		"OnStartTouch" "s2_boss_case_dest_zombiesPickRandomShuffle0-1"
	}
}

; Fix stage 2 boss where player touch a trigger_hurt and the nuke is enabled / stage completed
modify:
{
	match:
	{
		"targetname" "x_boss_s2_hurt_model"
		"classname" "trigger_hurt"
	}
	delete:
	{
		"OnStartTouch" "Branch_Perm_IsWon_Stage2SetValue101"
		"OnStartTouch" "add_scoreApplyScore1-1"
		"OnStartTouch" "cmdCommandsay { STAGE COMPLETED }11"
		"OnStartTouch" "s2_nuke_humans_winEnable0.51"
	}
}

; Modify wrong lip of final elevator on stage 1 ending so it reach the top and not get stuck before the final trigger
modify:
{
	match:
	{
		"targetname" "s1_ending_main_movelinear"
		"classname" "func_door"
	}
	replace:
	{
		"lip" "5504"
	}
}

; The mines will now also reduce speed of zombies if they trigger it
modify:
{
	match:
	{
		"targetname" "mine_hurt"
		"classname" "trigger_hurt"
	}
	insert:
	{
		"OnStartTouch" "speedModifySpeed1.05-1"
		"OnStartTouch" "speedModifySpeed0.50-1"
	}
}

; Reduce humans items shield and gravity cooldown from 65 to 60
modify:
{
	match:
	{
		"targetname" "human_item_gravity_filter"
		"classname" "filter_activator_name"
	}
	delete:
	{
		"OnPass" "human_item_gravity_effStart65-1"
		"OnPass" "human_item_gravity_buttonUnlock65-1"
	}
	insert:
	{
		"OnPass" "human_item_gravity_effStart60-1"
		"OnPass" "human_item_gravity_buttonUnlock60-1"
	}
}
