{
	match:
	{
		"targetname" "s2_once_survive"
		"classname" "trigger_once"
	}
	delete:
	{
		"OnStartTouch" "s2_tp_after_defense_areaEnable1101"
		"OnStartTouch" "s2_green_tree_p3Kill1101"
		"OnStartTouch" "cmdCommandsay { ZOMBIES WONT BE ABLE TO REACH YOU }611"
	}
	insert:
	{
		"OnStartTouch" "s2_tp_after_defense_areaEnable1201"
		"OnStartTouch" "s2_green_tree_p3Kill1201"
		"OnStartTouch" "cmdCommandsay { ZOMBIES WILL GET TELEPORTED FOR A WHILE }611"
	}
}