; fix flower damage

modify:
{    
    match:
    {
        "targetname" "Ball_Flower_Large_H"
        "classname" "trigger_hurt"
    }
    replace:
    {
        "damage" "80"
    }
}
modify:
{    
    match:
    {
        "targetname" "Ball_Flower_H"
        "classname" "trigger_hurt"
    }
    replace:
    {
        "damage" "100"
    }
}

modify:
{	
	match:
	{
		"classname" "logic_auto"
	}
	insert:
	{
		"OnMapSpawn" "CommandCommandsay **The damage of <-Flower-> has modified by stripper3-1"
	}
}

